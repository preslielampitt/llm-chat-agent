name: flake8

on:
  push:
  pull_request:

jobs:
  flake8:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install flake8
          pip3 install -r requirements.txt

      - name: Run flake8
        run: flake8 cmc_cs040_preslie --ignore=E501